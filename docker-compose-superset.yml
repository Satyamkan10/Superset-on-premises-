version: "3.9"
services:
  superset:
    build: .
    image: superset-mssql
    container_name: superset_app
    restart: always
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: 8GVcstnwfpxRYca3B+8hcc2+bSKOMOIYchHEW0az5Mg2ELILZrAsuCy8
      SUPERSET_DATABASE_URI: postgresql+psycopg2://superset:superset@superset_db:5432/superset
    depends_on:
      - superset_db
      - redis
    volumes:
      - superset_home:/app/superset_home

  superset_db:
    image: postgres:14
    container_name: superset_postgres
    restart: always
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: superset_redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  superset_home:
  superset_db_data:
  redis_data: